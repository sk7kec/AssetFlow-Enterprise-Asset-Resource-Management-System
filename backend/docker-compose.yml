# ─────────────────────────────────────────────────────────────────────────────
# AssetFlow Backend — Docker Compose
#
# Services:
#   assetflow-api   FastAPI application (built from Dockerfile)
#   mongo           MongoDB (for local development only)
#   mongo-express   MongoDB admin UI (development only)
#
# Usage:
#   Development:   docker compose up
#   Production:    docker compose -f docker-compose.yml up -d assetflow-api
#   Stop:          docker compose down
#   Rebuild:       docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ─── AssetFlow API ──────────────────────────────────────────────────
  assetflow-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: assetflow-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Override for Docker networking (connect to mongo service in dev)
      - MONGODB_URL=${MONGODB_URL}
      - APP_ENV=${APP_ENV:-development}
    volumes:
      # Persist uploads and logs outside container
      - assetflow-uploads:/app/uploads
      - assetflow-logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - assetflow-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.assetflow.rule=Host(`api.assetflow.local`)"

  # ─── MongoDB (Development Only) ─────────────────────────────────────
  # In production, use MongoDB Atlas (configure MONGODB_URL in .env)
  mongo:
    image: mongo:7.0
    container_name: assetflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: assetflow
      MONGO_INITDB_ROOT_PASSWORD: assetflow_dev_password
      MONGO_INITDB_DATABASE: assetflow_db
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - assetflow-net
    profiles:
      - development

  # ─── Mongo Express (Development UI) ─────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: assetflow-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: assetflow
      ME_CONFIG_MONGODB_ADMINPASSWORD: assetflow_dev_password
      ME_CONFIG_MONGODB_URL: mongodb://assetflow:assetflow_dev_password@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - assetflow-net
    profiles:
      - development


# ─── Networks ─────────────────────────────────────────────────────────────
networks:
  assetflow-net:
    driver: bridge
    name: assetflow-network


# ─── Volumes ──────────────────────────────────────────────────────────────
volumes:
  mongo-data:
    name: assetflow-mongo-data
  mongo-config:
    name: assetflow-mongo-config
  assetflow-uploads:
    name: assetflow-uploads
  assetflow-logs:
    name: assetflow-logs
